{% extends 'base.html' %}

{% block title %}Login - Offer App{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 100px auto;">
    <h2 style="text-align: center; margin-bottom: 24px;">Offer App</h2>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <label>Lozinka</label>
        <input type="password" name="password" required autofocus>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Prijavi se</button>
        <a href="/" class="btn btn-secondary" style="width: 100%; margin-top: 10px;">Početna strana</a>
    </form>
</div>

<style>
    /* Prevent base.html nav from showing on login page */
    nav,
    hr {
        display: none;
    }
</style>
{% endblock %}
