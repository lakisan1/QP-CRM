<!doctype html>
<html lang="sr" data-theme="{{ theme|default('dark') }}">
<head>
    <meta charset="utf-8">
    <title>{% block title %}Zakup{% endblock %} – QP-CRM</title>
    <link rel="icon" type="image/png" href="/app_assets/favicon.png">
    {% if not pdf_mode %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    {% endif %}
</head>
<body>
{% if not pdf_mode %}
<nav>
    <div class="nav-links">
        <a href="{{ url_for('list_contracts') }}" {% if request.endpoint=='list_contracts' %}class="active"{% endif %}>Ugovori</a>
        <a href="{{ url_for('list_clients') }}"   {% if request.endpoint=='list_clients'   %}class="active"{% endif %}>Klijenti</a>
        <a href="{{ url_for('list_equipment') }}" {% if request.endpoint=='list_equipment' %}class="active"{% endif %}>Oprema</a>
    </div>
    <div class="nav-right">
        <a href="/">Početna</a>
        <a href="{{ url_for('logout') }}" class="btn btn-danger" style="margin-right:15px;">Odjava</a>
        <div class="nav-logo-container">
            <img src="{{ url_for('static', filename='img/logo_company.jpg') }}" alt="Logo" class="nav-logo">
        </div>
    </div>
</nav>
<hr>
{% endif %}
{% block content %}{% endblock %}
{% if not pdf_mode %}
<script>
document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll('.searchable-select').forEach(el => {
        new TomSelect(el, { create: false, sortField: { field: "text", direction: "asc" } });
    });
});
</script>
{% endif %}
</body>
</html>
