{% extends "base.html" %}
{% block title %}Prijava – Zakup{% endblock %}
{% block content %}
<div style="max-width:380px;margin:80px auto;">
    <div class="card">
        <h2 style="text-align:center;margin-bottom:24px;">🔐 Zakup – Prijava</h2>
        {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
        <form method="post">
            <label>Lozinka</label>
            <input type="password" name="password" autofocus required style="margin-bottom:16px;">
            <button type="submit" class="btn btn-primary" style="width:100%;">Prijavi se</button>
        </form>
    </div>
</div>
{% endblock %}
